spring:
  application:
    name: securescape-backend

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  hikari:
    maximum-pool-size: 5
    minimum-idle: 0
    idle-timeout: 10000
    max-lifetime: 30000
    keepalive-time: 15000
    connection-timeout: 30000
    validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: ${PORT:5000}

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
